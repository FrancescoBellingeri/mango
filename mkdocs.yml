site_name: Mango
site_description: Natural language → MQL → Answers. The open-source AI agent for MongoDB.
site_url: https://francescobellingeri.github.io/mango-ai
repo_url: https://github.com/francescobellingeri/mango-ai
repo_name: francescobellingeri/mango-ai
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Get Started:
    - Quickstart: quickstart.md
    - LLM Providers: providers.md
  - Concepts:
    - Memory: memory.md
    - Tools: tools.md
    - Server API: server.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/francescobellingeri/mango-ai
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mango-ai
